<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8" />
    <title>Login</title>
</head>
<body>
    <h1>Iniciar sesión</h1>

    <div th:if="${param.error}">
        <p style="color:red">Nombre de usuario o contraseña inválidos.</p>
    </div>
    <div th:if="${param.logout}">
        <p style="color:green">Has cerrado sesión correctamente.</p>
    </div>
    <div th:if="${param.registrado}">
        <p style="color:green">Registro completado. Por favor inicia sesión.</p>
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div>
            <label>Email:</label>
            <input type="text" name="username" />
        </div>
        <div>
            <label>Contraseña:</label>
            <input type="password" name="password" />
        </div>
        <div>
            <button type="submit">Ingresar</button>
        </div>
    </form>
</body>
</html>
