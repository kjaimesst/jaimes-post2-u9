<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Registro</title>
</head>
<body>
    <h1>Crear cuenta</h1>

    <form th:action="@{/registro}" th:object="${usuario}" method="post">
        <div>
            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}" />
            <div th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}" style="color:red"></div>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" th:field="*{email}" />
            <div th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}" style="color:red"></div>
        </div>
        <div>
            <label>Contraseña:</label>
            <input type="password" th:field="*{contrasenia}" />
            <div th:if="${#fields.hasErrors('contrasenia')}"
                 th:errors="*{contrasenia}" style="color:red"></div>
        </div>
        <button type="submit">Registrarse</button>
    </form>

    <a th:href="@{/login}">¿Ya tiene cuenta? Iniciar sesión</a>
</body>
</html>
