<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <p>Bienvenido, <strong><span sec:authentication="name"></span></strong></p>

    <!--
        th:text escapa automáticamente el HTML.
        Protege contra ataques XSS: si el nombre contiene
        <script>alert("XSS")</script>, Thymeleaf lo muestra
        como texto plano, nunca lo ejecuta.
    -->
    <p>Nombre: <span th:text="${nombreUsuario}"></span></p>

    <div sec:authorize="hasRole('ADMIN')">
        <p>Tienes acceso de administrador.</p>
        <a th:href="@{/admin}">Panel de Administración</a>
    </div>

    <div sec:authorize="hasRole('USER')">
        <p>Contenido exclusivo para usuarios con rol USER.</p>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Cerrar sesión</button>
    </form>
</body>
</html>
