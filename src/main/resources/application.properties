spring.application.name=seguridad
spring.datasource.url=jdbc:mysql://localhost:3306/estudiantes_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.thymeleaf.cache=false

# Tiempo máximo que una conexión puede estar inactiva (10 minutos)
spring.datasource.hikari.max-lifetime=600000

# Hikari prueba la conexión antes de usarla con esta consulta
spring.datasource.hikari.connection-test-query=SELECT 1

# Tiempo máximo esperando una conexión disponible (30 segundos)
spring.datasource.hikari.connection-timeout=30000

# Tiempo máximo de inactividad antes de descartar la conexión (5 minutos)
spring.datasource.hikari.idle-timeout=300000